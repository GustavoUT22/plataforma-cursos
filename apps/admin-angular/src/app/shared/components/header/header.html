@if (!isLoggedIn()) {
  <nav class="navbar" role="navigation" aria-label="Navegación principal">
    <div class="container">
      <a routerLink="/" class="navbar-brand">
        <div class="brand-icon">🎓</div>
        <span>Edu<em>Tech</em></span>
      </a>

      <ul class="navbar-nav" role="list">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a></li>
        <li><a routerLink="/courses" routerLinkActive="active">Cursos</a></li>
        <li><a href="#beneficios">Beneficios</a></li>
      </ul>

      <div class="navbar-actions">
        <a routerLink="/login" class="btn btn-ghost btn-sm">Iniciar sesión</a>
        <a routerLink="/register" class="btn btn-primary btn-sm">Registrarse</a>
        <button class="hamburger" (click)="toggleMobileMenu()" aria-label="Abrir menú" [attr.aria-expanded]="mobileMenuOpen()">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  @if (mobileMenuOpen()) {
    <div class="mobile-nav open" role="navigation" aria-label="Menú móvil">
      <a routerLink="/" (click)="toggleMobileMenu()">🏠 Inicio</a>
      <a routerLink="/courses" (click)="toggleMobileMenu()">📚 Cursos</a>
      <a routerLink="/login" (click)="toggleMobileMenu()">🔑 Iniciar sesión</a>
      <a routerLink="/register" (click)="toggleMobileMenu()">✨ Registrarse</a>
    </div>
  }
}
